# Committed eval thresholds — CI blocks merge on regression below these values.
# Zero / null / false values cause the api service to refuse to boot (startup check).

classification:
  accuracy: 0.60          # ceiling observed at ~0.63 across multiple runs on ~1900 training samples with temporal split; 0.60 proves learning without demanding impossible generalization
  macro_f1: 0.60          # empirical ceiling ~0.63 with DistilBERT on this dataset size; temporal drift (train=older, test=newer issues) limits generalization
  per_class:              # question and feature are hardest due to sparse training examples and temporal drift
    bug: 0.55
    feature: 0.50
    docs: 0.85            # docs is highly distinctive — high threshold is achievable
    question: 0.35        # rarest class, most affected by drift — lower threshold reflects data constraint

rag:
  hit_at_5: 0.70          # retrieval: ground-truth chunk in top-5
  mrr: 0.60               # mean reciprocal rank - it means the right chunk is in the top 2 out of 5
  faithfulness: 0.65        # RAGAS: answer grounded in retrieved context; ceiling ~0.72–0.75 with gpt-4o-mini judge on this corpus — limited by short retrieved chunks not covering full answers
  answer_relevancy: 0.35    # RAGAS: answer addresses the question — gpt-4o-mini returns 1/3 reverse-generations, metric is noisy; threshold reflects measurement ceiling
  context_recall: 0.55      # RAGAS: retrieval covers the information needed to answer; ceiling ~0.58 — limited by paragraph-level chunking splitting related content across chunks

latency_ms:
  classification_p95: 200   # DistilBERT inference via inference/ service <50ms if on GPU
  rag_retrieval_p95: 300    # pgvector similarity search <300ms
  chat_e2e_p95: 5000        # full agent loop including LLM call

cost:
  max_tokens_per_request: 2000   # input + output cap per chat turn
  max_usd_per_1k_requests: 0.50  # gpt-4o-mini at ~500 in / 300 out tokens each
