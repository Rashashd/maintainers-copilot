name: RAG Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (always run, no infra needed) ──────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ── RAG retrieval + generation eval (full stack) ──────────────────────────
  rag-eval:
    runs-on: ubuntu-latest
    # Generation eval (RAGAS) calls OpenAI — only run on push to main to
    # avoid burning tokens on every PR.  Set SKIP_RAGAS=true on PRs.
    env:
      SKIP_RAGAS: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        # seed.sh is gitignored; we create a minimal .env for docker compose
        run: |
          cat > .env <<'EOF'
          VAULT_TOKEN=ci-vault-token
          DB_PASSWORD=ci-db-pass
          MINIO_ROOT_PASSWORD=ci-minio-pass
          DB_PORT=5433
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start infra services
        run: docker compose up -d db redis minio vault

      - name: Wait for infra health
        run: |
          for svc in db redis minio vault; do
            for i in $(seq 1 24); do
              status=$(docker compose ps "$svc" --format '{{.Health}}' 2>/dev/null || echo starting)
              if [ "$status" = "healthy" ]; then
                echo "$svc healthy"
                break
              fi
              [ "$i" -eq 24 ] && { echo "$svc never became healthy"; docker compose logs "$svc"; exit 1; }
              sleep 5
            done
          done

      - name: Seed Vault (CI — keys from GitHub Secrets)
        # Writes placeholder infra secrets + real LLM keys from GitHub Secrets.
        # Langfuse keys are left empty; the app logs a warning and continues.
        run: |
          vault_put() {
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "X-Vault-Token: ci-vault-token" \
              -X POST -d "$2" \
              "http://localhost:8200/v1/secret/data/$1")
            [ "$code" = "200" ] || { echo "Vault write $1 failed (HTTP $code)"; exit 1; }
            echo "  ✓ secret/$1"
          }
          vault_put db       '{"data":{"password":"ci-db-pass"}}'
          vault_put minio    '{"data":{"access_key":"minioadmin","secret_key":"ci-minio-pass"}}'
          vault_put jwt      '{"data":{"signing_key":"ci-jwt-signing-key-32-chars-long!!"}}'
          vault_put llm      "{\"data\":{\"openai_api_key\":\"${OPENAI_API_KEY}\",\"anthropic_api_key\":\"${ANTHROPIC_API_KEY}\"}}"
          vault_put langfuse '{"data":{"public_key":"","secret_key":"","host":""}}'
          vault_put github   '{"data":{"token":""}}'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build api and model-server
        run: docker compose build api model-server

      - name: Run migrations
        run: docker compose up --no-deps migrate
        # migrate exits 0 on success; docker compose up waits for completion

      - name: Start api and model-server
        run: docker compose up -d --no-deps api model-server

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API healthy"
              exit 0
            fi
            echo "  waiting for API... ($i/30)"
            sleep 10
          done
          echo "API did not become healthy"
          docker compose logs api
          exit 1

      - name: Set up Python for eval runner
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install eval dependencies
        run: pip install httpx pyyaml python-dotenv openai langchain-openai ragas

      - name: Run RAG retrieval eval
        # Retrieval eval (hit@5, MRR) requires indexed documents in the DB.
        # On a fresh CI DB the corpus is empty and scores will be 0 — run
        # `python -m app.rag.data.index_corpus` to populate it first.
        # Once indexed, the DB volume is persisted and subsequent runs pass.
        run: |
          python -m eval.rag.runner \
            --api-url http://localhost:8000 \
            ${{ env.SKIP_RAGAS == 'true' && '--no-ragas' || '' }}
        env:
          VAULT_ADDR: http://localhost:8200
          VAULT_TOKEN: ci-vault-token

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-report
          path: eval/rag/eval_report.json
