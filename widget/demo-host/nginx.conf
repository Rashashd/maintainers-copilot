# Port 80 — allowed origin (http://localhost:8080)
server {
    listen 80;
    root /usr/share/nginx/html;
    location / {
        try_files /allowed.html =404;
    }
}

# Port 81 — unallowed origin (http://localhost:8081)
server {
    listen 81;
    root /usr/share/nginx/html;
    location / {
        try_files /unallowed.html =404;
    }
}
