services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: copilot
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbadmin -d copilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  vault:
    image: hashicorp/vault:latest
    entrypoint: ["vault", "server", "-dev", "-dev-listen-address=0.0.0.0:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DISABLE_MLOCK: "1"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${VAULT_PORT:-8200}:8200"

  migrate:
    build:
      context: .
      dockerfile: app/db/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://dbadmin:${DB_PASSWORD}@db:5432/copilot
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      # Only infra topology — no secrets here; app reads secrets from Vault at startup
      DATABASE_URL: postgresql+asyncpg://dbadmin:${DB_PASSWORD}@db:5432/copilot
      REDIS_URL: redis://redis:6379
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      MINIO_ENDPOINT: minio:9000
      INFERENCE_URL: http://model-server:8001
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  model-server:
    build:
      context: .
      dockerfile: inference/Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
      - ./ml/finetune/output:/app/ml/finetune/output:ro
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "${MODEL_SERVER_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatbot:
    build:
      context: .
      dockerfile: chatbot/Dockerfile
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${CHATBOT_PORT:-8501}:8501"

  widget:
    build:
      context: widget
      dockerfile: Dockerfile
    ports:
      - "${WIDGET_PORT:-3000}:80"

  host:
    build:
      context: widget/demo-host
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-8080}:80"

volumes:
  pgdata:
  miniodata:
  huggingface_cache:
  torch_cache:
